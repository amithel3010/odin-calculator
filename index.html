<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <link rel="stylesheet" href="./style.css">
    </head>

    <body>
        <div id="calc-ui">
            <p id="display">0</p>
            <div id="buttons-container">
                <div class="row" id="row-01">
                    <button id="clear-button" class="key special">AC</button>
                    <button id="backspace" class="key special">&#9003;</button>
                </div>

                <div class="row" id="row-02">
                    <button class="key number">1</button>
                    <button class="key number">2</button>
                    <button class="key number">3</button>
                    <button class="key operator">+</button>
                </div>

                <div class="row" id="row-03">
                    <button class="key number">4</button>
                    <button class="key number">5</button>
                    <button class="key number">6</button>
                    <button class="key operator">-</button>
                </div>

                <div class="row" id="row-04">
                    <button class="key number">7</button>
                    <button class="key number">8</button>
                    <button class="key number">9</button>
                    <button class="key operator">*</button>
                </div>
                <div class="row" id="row-05">
                    <button class="key number" id="number-0">0</button>
                    <button id="equals" class="key">=</button>
                    <button class="key operator">/</button>
                </div>
            </div>
        </div>

        <script src="./code.js"></script>
    </body>

</html>
